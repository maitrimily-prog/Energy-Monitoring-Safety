<script>
  const FIREBASE_CONFIG = {
    apiKey:      "AIzaSyCRmRyXQjNDPPTSjPjCTQcanGm183rW9dw",   // ← paste your Web API Key
    databaseURL: "https://energy-monitoring-and-safety-default-rtdb.asia-southeast1.firebasedatabase.app",
  };

  /* DB node paths */
  const DEVICES = [
    { key: 'Device-1', num: 1, vField: 'Voltage1', aField: 'Current1', emField: 'Emergency1', rField: 'isOn' },
    { key: 'Device-2', num: 2, vField: 'Voltage2', aField: 'Current2', emField: 'Emergency2', rField: 'isOn' },
    { key: 'Device-3', num: 3, vField: 'Voltage3', aField: 'Current3', emField: 'Emergency3', rField: 'isOn' },
  ];

  const V_MAX = 260; 
  const A_MAX = 20;  

  let currentRelayStates = { 1: false, 2: false, 3: false };
  
  // Heartbeat tracking variables
  let dbConnected = false;
  let espOnline = false;
  let heartbeatTimer = null;

  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
  }, 1000);

  window.addEventListener('DOMContentLoaded', () => {
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      startListeners();
    } catch (e) {
      setConnPill('offline', 'ERROR');
      console.error('Firebase init failed:', e);
    }
  });

  function setConnPill(state, label) {
    const pill = document.getElementById('connPill');
    const lbl  = document.getElementById('connLabel');
    pill.className = 'conn-pill ' + state;
    lbl.textContent = label;
  }

  function updateConnectionUI() {
    if (!dbConnected) {
      setConnPill('connecting', 'DB DISCONNECTED');
      setAllDashboardsOffline();
    } else if (!espOnline) {
      setConnPill('offline', 'ESP OFFLINE');
      setAllDashboardsOffline();
    } else {
      setConnPill('live', 'ESP LIVE');
    }
  }

  // Set everything to "--" when disconnected
  function setAllDashboardsOffline() {
    for (let n = 1; n <= 3; n++) {
      document.getElementById(`v-${n}`).textContent = '--';
      document.getElementById(`a-${n}`).textContent = '--';
      document.getElementById(`p-${n}`).textContent = '-- W';
      document.getElementById(`vbar-${n}`).style.width = '0%';
      document.getElementById(`abar-${n}`).style.width = '0%';
      
      const ts = document.getElementById(`ts-${n}`);
      ts.textContent = 'DEVICE DISCONNECTED';
      ts.style.color = 'var(--danger)';
    }
    document.getElementById('sum-power').textContent = '-- W';
    document.getElementById('sum-volt').textContent = '-- V';
    document.getElementById('sum-amp').textContent = '-- A';
    document.getElementById('sum-em').textContent = '--';
    document.getElementById('sum-em').style.color = 'var(--muted)';
  }

  function startListeners() {
    const db = firebase.database();

    // 1. Watch Browser-to-Firebase connection
    db.ref('.info/connected').on('value', snap => {
      dbConnected = snap.val();
      updateConnectionUI();
    });

    // 2. Watch ESP32 Heartbeat (Updated Path: Device/heartbeat)
    db.ref('Device/heartbeat').on('value', snap => {
      if (!dbConnected) return;

      // ESP just checked in
      espOnline = true;
      updateConnectionUI();

      // Clear the old timer and start a new 4-second countdown
      clearTimeout(heartbeatTimer);
      heartbeatTimer = setTimeout(() => {
        espOnline = false;
        updateConnectionUI();
      }, 4000);
    });

    // 3. Watch Device Data
    DEVICES.forEach(dev => {
      db.ref(`Device/${dev.key}`).on('value', snap => {
        if (!espOnline) return; 

        const data = snap.val();
        if (!data) return;

        // Parse Float will turn empty strings ("") into NaN, which safely falls back to || 0
        const v  = parseFloat(data[dev.vField]) || 0;
        const a  = parseFloat(data[dev.aField]) || 0;
        const em = parseBool(data[dev.emField]);
        const r  = parseBool(data[dev.rField]); 

        currentRelayStates[dev.num] = r;

        renderCard(dev.num, v, a, em, r);
        renderSummary();
      });
    });
  }

  function parseBool(val) {
    if (val == null || val === "") return false;
    if (typeof val === 'boolean') return val;
    const s = String(val).toLowerCase().trim();
    return s === '1' || s === 'true' || s === 'yes' || s === 'on';
  }

  function renderCard(n, v, a, em, relayOn) {
    const vEl = document.getElementById(`v-${n}`);
    const aEl = document.getElementById(`a-${n}`);
    const btn = document.getElementById(`btn-relay-${n}`);
    const tsEl = document.getElementById(`ts-${n}`);

    vEl.classList.remove('loading');
    aEl.classList.remove('loading');

    vEl.textContent = v.toFixed(1);
    aEl.textContent = a.toFixed(2);

    document.getElementById(`vbar-${n}`).style.width = Math.min(100, (v / V_MAX) * 100).toFixed(1) + '%';
    document.getElementById(`abar-${n}`).style.width = Math.min(100, (a / A_MAX) * 100).toFixed(1) + '%';

    const pw = v * a;
    document.getElementById(`p-${n}`).textContent = pw.toFixed(1) + ' W';

    const badge = document.getElementById(`em-${n}`);
    const card  = document.getElementById(`card-${n}`);
    const txt   = document.getElementById(`em-text-${n}`);

    if (em) {
      badge.className = 'em-badge on';
      txt.textContent = 'EMERGENCY';
      card.classList.add('em-on');
    } else {
      badge.className = 'em-badge off';
      txt.textContent = 'NORMAL';
      card.classList.remove('em-on');
    }

    if (relayOn) {
      btn.className = 'btn-toggle pwr-on';
      btn.textContent = 'PWR: ON';
    } else {
      btn.className = 'btn-toggle pwr-off';
      btn.textContent = 'PWR: OFF';
    }

    tsEl.textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour12: false });
    tsEl.style.color = 'var(--muted)';
  }

  function renderSummary() {
    let totalPow = 0, totalV = 0, totalA = 0, emCount = 0, active = 0;

    for (let n = 1; n <= 3; n++) {
      const vEl = document.getElementById(`v-${n}`);
      if (!vEl || vEl.textContent === '--') continue;

      const v = parseFloat(vEl.textContent) || 0;
      const a = parseFloat(document.getElementById(`a-${n}`).textContent) || 0;
      totalPow += v * a;
      totalV   += v;
      totalA   += a;
      active++;

      if (document.getElementById(`card-${n}`).classList.contains('em-on')) emCount++;
    }

    document.getElementById('sum-power').textContent = active ? totalPow.toFixed(1) + ' W' : '0.0 W';
    document.getElementById('sum-volt').textContent  = active ? (totalV / active).toFixed(1) + ' V' : '0.0 V';
    document.getElementById('sum-amp').textContent   = active ? (totalA / active).toFixed(2) + ' A' : '0.00 A';

    const emEl = document.getElementById('sum-em');
    emEl.textContent = emCount;
    emEl.style.color = emCount > 0 ? 'var(--danger)' : 'var(--safe)';

    const clearBtn = document.getElementById('btn-clear-alerts');
    clearBtn.disabled = (emCount === 0);
  }

  function toggleRelay(n) {
    if (!espOnline) {
      alert("Cannot toggle relay. ESP32 is offline.");
      return;
    }
    
    const db = firebase.database();
    const dev = DEVICES.find(d => d.num === n);
    if (!dev) return;

    const newState = !currentRelayStates[n]; 
    let updates = {};
    updates[`Device/${dev.key}/${dev.rField}`] = newState;

    db.ref().update(updates).catch(error => {
      console.error("Error updating relay:", error);
      alert("Failed to toggle device. Check connection.");
    });
  }

  function clearAllAlerts() {
    if (!espOnline) {
      alert("Cannot clear alerts. ESP32 is offline.");
      return;
    }

    const db = firebase.database();
    let updates = {};

    DEVICES.forEach(dev => {
      updates[`Device/${dev.key}/${dev.emField}`] = false;
      updates[`Device/${dev.key}/${dev.rField}`] = true; 
    });

    db.ref().update(updates).then(() => {
      console.log("All alerts cleared.");
    }).catch(error => {
      console.error("Error clearing alerts:", error);
    });
  }
</script>
